<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NekoBeats Community Themes - Discover, upload, and share custom audio visualizer themes.">
  <title>Community Themes | NekoBeats</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #a855f7;
      --secondary: #6366f1;
      --bg: #0a0a0a;
      --bg-alt: #1a1a2e;
      --text: #ffffff;
      --text-muted: #aaa;
      --border: rgba(168, 85, 247, 0.1);
      --border-hover: rgba(168, 85, 247, 0.3);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #1a0a2e 100%);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

    header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-nav {
      display: flex;
      gap: 20px;
    }

    .header-nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .header-nav a:hover {
      color: var(--primary);
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    .hero-section {
      margin-bottom: 80px;
      text-align: center;
    }

    .hero-section h1 {
      font-size: 48px;
      font-weight: 900;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }

    .hero-section p {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 40px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .controls {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      max-width: 400px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 12px 16px;
      padding-left: 40px;
      background: rgba(168, 85, 247, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      transition: all 0.3s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--border-hover);
      background: rgba(168, 85, 247, 0.1);
    }

    .search-box i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .sort-select {
      padding: 12px 16px;
      background: rgba(168, 85, 247, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
    }

    .upload-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 8px;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 24px;
      font-weight: 700;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      transition: color 0.3s;
    }

    .close-btn:hover {
      color: var(--text);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .form-group input[type="text"],
    .form-group input[type="file"],
    .form-group textarea {
      width: 100%;
      padding: 12px;
      background: rgba(168, 85, 247, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--border-hover);
      background: rgba(168, 85, 247, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    input[type="file"] {
      display: none;
    }

    .file-input-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px;
      background: rgba(168, 85, 247, 0.05);
      border: 2px dashed var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .file-input-label:hover {
      border-color: var(--border-hover);
      background: rgba(168, 85, 247, 0.1);
    }

    .file-input-label i {
      font-size: 24px;
      color: var(--primary);
    }

    .form-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      border-radius: 8px;
      color: var(--text);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .form-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
    }

    .form-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .themes-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .theme-card {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.05), rgba(99, 102, 241, 0.05));
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
    }

    .theme-card:hover {
      transform: translateY(-8px);
      border-color: var(--border-hover);
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(99, 102, 241, 0.1));
      box-shadow: 0 20px 40px rgba(168, 85, 247, 0.1);
    }

    .theme-thumbnail {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #1a0a2e 0%, #16213e 100%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      padding: 12px;
      align-content: center;
    }

    .color-bar {
      height: 100%;
      border-radius: 2px;
      animation: pulse 0.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scaleY(0.3); }
      50% { transform: scaleY(1); }
    }

    .theme-content {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .theme-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }

    .theme-creator {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .theme-description {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      flex: 1;
    }

    .theme-stats {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat i {
      color: var(--primary);
    }

    .rating {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .star {
      color: #fbbf24;
    }

    .theme-actions {
      display: flex;
      gap: 8px;
    }

    .download-btn,
    .rate-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .download-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--text);
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
    }

    .rate-btn {
      background: rgba(168, 85, 247, 0.1);
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .rate-btn:hover {
      background: rgba(168, 85, 247, 0.2);
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .loading i {
      font-size: 48px;
      color: var(--primary);
      margin-bottom: 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 64px;
      color: var(--primary);
      margin-bottom: 20px;
      opacity: 0.5;
    }

    .empty-state h2 {
      font-size: 24px;
      margin-bottom: 12px;
      color: var(--text);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--text);
      padding: 16px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2000;
      animation: slideInRight 0.3s ease;
    }

    .toast.error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 768px) {
      header { padding: 16px 20px; }
      .header-content { flex-direction: column; }
      main { padding: 40px 20px; }
      .hero-section h1 { font-size: 32px; }
      .themes-container { grid-template-columns: 1fr; }
      .modal-content { padding: 24px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo-text"><i class="fas fa-music"></i> NekoBeats Themes</div>
      <nav class="header-nav">
        <a href="https://catsdevs.online/NekoBeats-V2/">← Back to NekoBeats</a>
        <a href="https://github.com/justdev-chris/NekoBeats-V2">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-section">
      <h1>Community Themes</h1>
      <p>Discover, create, and share custom themes for NekoBeats. Download presets from the community or upload your own.</p>
    </section>

    <div class="controls">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search themes by name or creator...">
      </div>
      <select id="sortSelect" class="sort-select">
        <option value="newest">Newest First</option>
        <option value="most-downloaded">Most Downloaded</option>
        <option value="highest-rated">Highest Rated</option>
      </select>
      <button class="upload-btn" onclick="openUploadModal()">
        <i class="fas fa-cloud-upload-alt"></i> Upload Theme
      </button>
    </div>

    <div id="themesContainer" class="themes-container">
      <div class="loading">
        <i class="fas fa-spinner"></i>
        <p>Loading themes...</p>
      </div>
    </div>
  </main>

  <div id="uploadModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Upload Theme</h2>
        <button class="close-btn" onclick="closeUploadModal()">&times;</button>
      </div>
      <form id="uploadForm">
        <div class="form-group">
          <label for="username">Your Name</label>
          <input type="text" id="username" placeholder="e.g., SoundMaster" maxlength="32" required>
        </div>
        <div class="form-group">
          <label for="themeName">Theme Name</label>
          <input type="text" id="themeName" placeholder="e.g., Cyberpunk Red" maxlength="50" required>
        </div>
        <div class="form-group">
          <label for="description">Description (optional)</label>
          <textarea id="description" placeholder="Describe your theme..." maxlength="200"></textarea>
        </div>
        <div class="form-group">
          <label>File Type</label>
          <div style="display: flex; gap: 10px; margin-bottom: 16px;">
            <label style="flex: 1; margin: 0;">
              <input type="radio" name="fileType" value="nbp" checked style="margin-right: 8px;">
              <span>Visualizer Theme (.nbp)</span>
            </label>
            <label style="flex: 1; margin: 0;">
              <input type="radio" name="fileType" value="nbbar" style="margin-right: 8px;">
              <span>Bar Preset (.nbbar)</span>
            </label>
          </div>
        </div>
        <div class="form-group">
          <label for="themeFile">File *</label>
          <label for="themeFile" class="file-input-label">
            <i class="fas fa-file-upload"></i>
            <div>Click to upload or drag & drop</div>
          </label>
          <input type="file" id="themeFile" accept=".nbp,.nbbar" required onchange="updateFileName()">
        </div>
        <button type="submit" class="form-submit" id="submitBtn">Upload Theme</button>
      </form>
    </div>
  </div>

  <div id="ratingModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h2>Rate Theme</h2>
        <button class="close-btn" onclick="closeRatingModal()">&times;</button>
      </div>
      <div style="text-align: center; padding: 20px;">
        <div style="font-size: 48px; margin-bottom: 20px;">
          <span id="star1" class="star" onclick="setRating(1)" style="cursor: pointer;">☆</span>
          <span id="star2" class="star" onclick="setRating(2)" style="cursor: pointer;">☆</span>
          <span id="star3" class="star" onclick="setRating(3)" style="cursor: pointer;">☆</span>
          <span id="star4" class="star" onclick="setRating(4)" style="cursor: pointer;">☆</span>
          <span id="star5" class="star" onclick="setRating(5)" style="cursor: pointer;">☆</span>
        </div>
        <button type="button" class="form-submit" onclick="submitRating()" style="margin-top: 20px;">Submit Rating</button>
      </div>
    </div>
  </div>

  <script>
    // if forking, DO NOT use my API. Host your own.
    const API_BASE = 'https://nbp.catsdevs.online/api/themes';

    let themes = [];
    let currentRatingThemeId = null;
    let currentRating = 0;

    document.addEventListener('DOMContentLoaded', () => {
      loadThemes();
      document.getElementById('uploadForm').addEventListener('submit', handleUpload);
      document.getElementById('searchInput').addEventListener('input', filterThemes);
      document.getElementById('sortSelect').addEventListener('change', filterThemes);
    });

    async function loadThemes() {
      try {
        const response = await fetch(API_BASE);
        const data = await response.json();
        if (data.success) {
          themes = data.themes;
          renderThemes(themes);
        } else {
          showToast('Failed to load themes', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
        showToast('Error loading themes', 'error');
      }
    }

    function renderThemes(themesToRender) {
      const container = document.getElementById('themesContainer');
      if (themesToRender.length === 0) {
        container.innerHTML = '<div style="grid-column: 1/-1;"><div class="empty-state"><i class="fas fa-inbox"></i><h2>No themes found</h2><p>Be the first to upload!</p></div></div>';
        return;
      }
      container.innerHTML = themesToRender.map(theme => `
        <div class="theme-card">
          <div class="theme-thumbnail">
            <div class="color-bar" style="background: #a855f7; animation-delay: 0s;"></div>
            <div class="color-bar" style="background: #6366f1; animation-delay: 0.1s;"></div>
            <div class="color-bar" style="background: #ec4899; animation-delay: 0.2s;"></div>
            <div class="color-bar" style="background: #f59e0b; animation-delay: 0.3s;"></div>
          </div>
          <div class="theme-content">
            <div class="theme-name">${esc(theme.name)}</div>
            <div class="theme-creator">by ${esc(theme.creator)}</div>
            <div class="theme-description">${esc(theme.description || 'No description')}</div>
            <div class="theme-stats">
              <div class="stat"><i class="fas fa-download"></i>${theme.downloads || 0}</div>
              <div class="rating"><span class="star">★</span><span>${theme.rating > 0 ? theme.rating.toFixed(1) : 'N/A'}</span></div>
            </div>
            <div class="theme-actions">
              <button class="download-btn" onclick="downloadTheme('${theme.id}', '${esc(theme.name)}')"><i class="fas fa-download"></i> Download</button>
              <button class="rate-btn" onclick="openRatingModal('${theme.id}')"><i class="fas fa-star"></i> Rate</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterThemes() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const sort = document.getElementById('sortSelect').value;
      let filtered = themes.filter(t => t.name.toLowerCase().includes(search) || t.creator.toLowerCase().includes(search));
      if (sort === 'most-downloaded') filtered.sort((a, b) => (b.downloads || 0) - (a.downloads || 0));
      else if (sort === 'highest-rated') filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
      renderThemes(filtered);
    }

    async function handleUpload(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const name = document.getElementById('themeName').value;
      const description = document.getElementById('description').value;
      const file = document.getElementById('themeFile').files[0];
      const fileType = document.querySelector('input[name="fileType"]:checked').value;

      if (!file) {
        showToast('Select a file', 'error');
        return;
      }

      // Validate file extension
      const validExtensions = { nbp: '.nbp', nbbar: '.nbbar' };
      const hasValidExtension = file.name.endsWith(validExtensions[fileType]);
      
      if (!hasValidExtension) {
        showToast(`File must be a ${validExtensions[fileType]} file`, 'error');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Uploading...';

      try {
        const reader = new FileReader();
        reader.onload = async (e) => {
          const buffer = e.target.result.split(',')[1];
          const response = await fetch(API_BASE, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, name, description, fileBuffer: buffer, fileType })
          });
          const data = await response.json();
          if (data.success) {
            showToast('Uploaded!');
            closeUploadModal();
            document.getElementById('uploadForm').reset();
            loadThemes();
          } else {
            showToast(data.error || 'Upload failed', 'error');
          }
          btn.disabled = false;
          btn.textContent = 'Upload Theme';
        };
        reader.readAsDataURL(file);
      } catch (error) {
        showToast('Error uploading', 'error');
        btn.disabled = false;
        btn.textContent = 'Upload Theme';
      }
    }

    async function downloadTheme(id, name) {
      try {
        const response = await fetch(`${API_BASE}?action=download&id=${id}`);
        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        
        // Detect file type - default to .nbp if unknown
        const fileType = blob.type.includes('nbbar') ? 'nbbar' : 'nbp';
        a.download = name + '.' + fileType;
        
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showToast(`Downloaded ${name}!`);
      } catch (error) {
        showToast('Error downloading', 'error');
      }
    }

    function openRatingModal(id) {
      currentRatingThemeId = id;
      currentRating = 0;
      updateStars();
      document.getElementById('ratingModal').classList.add('active');
    }

    function closeRatingModal() {
      document.getElementById('ratingModal').classList.remove('active');
    }

    function setRating(rating) {
      currentRating = rating;
      updateStars();
    }

    function updateStars() {
      for (let i = 1; i <= 5; i++) {
        document.getElementById(`star${i}`).textContent = i <= currentRating ? '★' : '☆';
      }
    }

    async function submitRating() {
      if (!currentRating) {
        showToast('Select a rating', 'error');
        return;
      }
      try {
        const response = await fetch(`${API_BASE}?action=rate&id=${currentRatingThemeId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rating: currentRating })
        });
        const data = await response.json();
        if (data.success) {
          showToast('Rated!');
          closeRatingModal();
          loadThemes();
        }
      } catch (error) {
        showToast('Error rating', 'error');
      }
    }

    function openUploadModal() {
      document.getElementById('uploadModal').classList.add('active');
    }

    function closeUploadModal() {
      document.getElementById('uploadModal').classList.remove('active');
    }

    function updateFileName() {
      const file = document.getElementById('nbpFile').files[0];
      if (file) console.log('Selected:', file.name);
    }

    function showToast(msg, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('uploadModal').addEventListener('click', (e) => {
      if (e.target.id === 'uploadModal') closeUploadModal();
    });

    document.getElementById('ratingModal').addEventListener('click', (e) => {
      if (e.target.id === 'ratingModal') closeRatingModal();
    });
  </script>
</body>
</html>
